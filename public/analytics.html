<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Factory Safety System — Analytics. Real-time analytics, trend monitoring, and system operations feed.">
    <title>Smart Factory Safety System — Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="forge.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
    .intel-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}
    .intel-stat{background:var(--abyss);border:1px solid var(--border);border-radius:4px;padding:1.25rem;text-align:center}
    .intel-val{display:block;font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--t1);margin-bottom:4px;animation:numberCount .4s ease}
    .intel-val.danger-val{color:var(--danger)}
    .intel-val.cyan-val{color:var(--cyan)}
    .intel-label{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.65rem;letter-spacing:.14em;color:var(--t3)}

    .sys-feed{background:var(--void);border:1px solid var(--border);border-radius:3px;max-height:300px;overflow-y:auto;padding:.5rem}
    .feed-line{display:flex;gap:12px;align-items:baseline;padding:5px 8px;border-left:3px solid transparent;font-family:'Share Tech Mono',monospace;font-size:.76rem;animation:rowSlideIn .22s ease;border-bottom:1px solid rgba(255,255,255,.02)}
    .feed-line.critical{color:var(--danger);border-left-color:var(--danger)}
    .feed-line.warning{color:var(--warn);border-left-color:var(--warn)}
    .feed-line.info{color:var(--cyan);border-left-color:var(--cyan)}
    .feed-line .feed-ts{color:var(--t3);flex-shrink:0}
    </style>
</head>
<body>
    <canvas id="bg-canvas" style="position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:0.38;"></canvas>
    <div id="scanlines"></div><div id="alert-warning"></div><div id="alert-danger"></div>

    <nav id="command-rail">
        <div class="rail-logo"><svg width="42" height="42" viewBox="0 0 42 42"><polygon points="21,3 38,12 38,30 21,39 4,30 4,12" fill="none" stroke="var(--cyan)" stroke-width="1.2" opacity="0.8" style="animation:railLogoRotate 14s linear infinite;transform-origin:21px 21px;"/><text x="21" y="25" text-anchor="middle" fill="var(--cyan)" font-family="Share Tech Mono" font-size="8">SF</text></svg><span class="rail-logo-sub">SYS//01</span></div>
        <div class="rail-nav">
            <a href="dashboard.html" class="rail-btn" data-tip="Dashboard"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
            <a href="machines.html" class="rail-btn" data-tip="Machines"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg></a>
            <a href="graphs.html" class="rail-btn" data-tip="Graphs"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12 Q6 6 12 12 Q18 6 22 12"/><path d="M2 18 Q6 12 12 18 Q18 12 22 18"/></svg></a>
            <a href="analytics.html" class="rail-btn active" data-tip="Analytics"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg></a>
            <a href="control.html" class="rail-btn" data-tip="Control"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a5 5 0 0 1 0 10"/><circle cx="12" cy="12" r="1.5"/><line x1="12" y1="13.5" x2="12" y2="22"/></svg></a>
            <a href="alerts.html" class="rail-btn" data-tip="Alerts"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.3 3.7a2 2 0 0 1 3.4 0L21 18H3L10.3 3.7Z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg></a>
        </div>
        <div class="rail-bottom"><div class="rail-avatar" id="user-avatar">??</div><button class="rail-logout" onclick="logout()" title="Logout"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div>
    </nav>

    <main class="content">
        <h1 class="page-heading">SMART FACTORY SAFETY SYSTEM<span> // </span>ANALYTICS</h1>

        <div class="intel-stats reveal">
            <div class="intel-stat"><span class="intel-val" id="stat-events">0</span><span class="intel-label">EVENTS PROCESSED</span></div>
            <div class="intel-stat"><span class="intel-val danger-val" id="stat-critical">0</span><span class="intel-label">CRITICAL TODAY</span></div>
            <div class="intel-stat"><span class="intel-val" id="stat-uptime">00:00:00</span><span class="intel-label">SYSTEM UPTIME</span></div>
            <div class="intel-stat"><span class="intel-val cyan-val" id="stat-response">42ms</span><span class="intel-label">AVG RESPONSE</span></div>
        </div>



        <div class="section-divider"><span>SYSTEM OPERATIONS FEED</span><div class="div-line"></div></div>
        <div class="sys-feed" id="sys-feed"></div>
    </main>

    <script src="forge.js"></script>
    <script>
    const auth = getAuthInfo();
    if (!auth) throw 'No auth';
    const { userId, simParam } = auth;

    let eventCount = 0;
    let criticalCount = 0;

    // Connect real-time pushes
    document.addEventListener('sensorUpdate', (e) => {
        const { sensors, machines } = e.detail;
        const now = Date.now();



        eventCount++;
        document.getElementById('stat-events').textContent = eventCount;
        document.getElementById('stat-response').textContent = Math.floor(20 + Math.random() * 40) + 'ms';
    });

    document.addEventListener('newAlert', (e) => {
        const a = e.detail;
        const sev = a.severity === 'DANGER' ? 'critical' : 'warning';
        if (sev === 'critical') {
            criticalCount++;
            document.getElementById('stat-critical').textContent = criticalCount;
        }

        const feed = document.getElementById('sys-feed');
        const line = document.createElement('div');
        line.className = 'feed-line ' + sev;
        line.innerHTML = `<span class="feed-ts">${a.timestamp}</span><span>${a.message}</span>`;
        feed.insertBefore(line, feed.firstChild);
        if (feed.children.length > 50) feed.removeChild(feed.lastChild);
    });

    async function loadAPILogs() {
        try {
            const [alRes, actRes] = await Promise.all([
                fetch(`/api/alerts?user_id=${userId}${simParam}`),
                fetch(`/api/actuators/logs?user_id=${userId}${simParam}`)
            ]);
            const alData = await alRes.json();
            const actData = await actRes.json();

            let combined = [];
            if (alData.success) {
                combined = combined.concat(alData.data.map(a => ({
                    tsDate: new Date(a.timestamp),
                    sev: a.alert_level === 'CRITICAL' ? 'critical' : 'warning',
                    msg: a.alert_message || ''
                })));
                criticalCount += alData.data.filter(a => a.alert_level === 'CRITICAL').length;
            }
            if (actData.success) {
                combined = combined.concat(actData.data.map(a => ({
                    tsDate: new Date(a.timestamp),
                    sev: 'info',
                    msg: `▶ ACTUATOR [${a.actuator_name}]: ${a.action} | Activated due to: ${a.trigger_type.toUpperCase()}`
                })));
            }

            eventCount += combined.length;
            combined.sort((a,b) => a.tsDate - b.tsDate); // Sort oldest first so they append sequentially

            const feed = document.getElementById('sys-feed');
            combined.forEach(a => {
                const line = document.createElement('div');
                line.className = 'feed-line ' + a.sev;
                line.innerHTML = `<span class="feed-ts">${a.tsDate.toLocaleTimeString('en-GB')}</span><span>${a.msg}</span>`;
                feed.insertBefore(line, feed.firstChild);
            });
            
            while (feed.children.length > 50) feed.removeChild(feed.lastChild);

            document.getElementById('stat-events').textContent = eventCount;
            document.getElementById('stat-critical').textContent = criticalCount;
        } catch(e) {}
    }

    loadAPILogs();

    // Live session uptime
    let startTm = sessionStorage.getItem('sys_start_time');
    if (!startTm) { startTm = Date.now(); sessionStorage.setItem('sys_start_time', startTm); }
    setInterval(() => {
        let diff = Math.floor((Date.now() - startTm) / 1000);
        let h = String(Math.floor(diff/3600)).padStart(2,'0');
        let m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
        let s = String(diff%60).padStart(2,'0');
        document.getElementById('stat-uptime').textContent = `${h}:${m}:${s}`;
    }, 1000);
    </script>
</body>
</html>
